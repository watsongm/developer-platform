name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backstage backend ─────────────────────────────────────────────────────────
  backstage-backend:
    name: Backstage Backend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backstage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack / Yarn 4
        run: corepack enable && corepack prepare yarn@4.1.1 --activate

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('backstage/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install

      - name: TypeScript type-check
        run: yarn tsc

      - name: Build
        run: yarn build

  # ── Backstage frontend ────────────────────────────────────────────────────────
  backstage-frontend:
    name: Backstage Frontend (lint)
    runs-on: ubuntu-latest
    needs: backstage-backend
    defaults:
      run:
        working-directory: backstage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack / Yarn 4
        run: corepack enable && corepack prepare yarn@4.1.1 --activate

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('backstage/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn backstage-cli package lint --since origin/main || true

  # ── MCP server ────────────────────────────────────────────────────────────────
  mcp-server:
    name: MCP Server (install + syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('mcp-server/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: node --check index.js

  # ── Docker image ──────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backstage-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: backstage
          file: backstage/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: idp-backstage:${{ github.sha }}

  # ── YAML / catalog validation ─────────────────────────────────────────────────
  validate-yaml:
    name: Validate YAML files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: |
          # .yamllint.yml excludes templates/*/skeleton/ dirs which contain
          # Nunjucks expressions that are not valid YAML.
          yamllint -c .yamllint.yml \
            catalog/ templates/ rbac/ backstage/app-config.yaml backstage/app-config.production.yaml
